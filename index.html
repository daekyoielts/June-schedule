<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CD WJL 6월 근무 스케줄 신청서</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f4f5f7;
    min-height: 100vh;
    padding: 24px 16px 60px;
    color: #1a1a2e;
  }

  .card {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  .card-header {
    background: #c0392b;
    padding: 28px 24px 22px;
    color: white;
  }

  .card-header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .card-header p {
    font-size: 13px;
    margin-top: 6px;
    opacity: 0.85;
    line-height: 1.5;
  }

  .name-section {
    padding: 20px 24px 0;
  }

  .name-section label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #555;
    margin-bottom: 6px;
  }

  .name-section input {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .name-section input:focus {
    border-color: #c0392b;
  }

  .section-title {
    padding: 20px 24px 4px;
    font-size: 13px;
    font-weight: 500;
    color: #555;
  }

  .calendar-wrap {
    padding: 8px 16px 20px;
  }

  /* DOW header */
  .dow-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    margin-bottom: 4px;
  }

  .dow-row span {
    font-size: 12px;
    font-weight: 500;
    padding: 4px 0;
    color: #888;
  }

  .dow-row span.sun { color: #c0392b; }
  .dow-row span.sat { color: #2255cc; }

  /* Calendar grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .cal-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .day-btn {
    width: 100%;
    height: 100%;
    border: none;
    background: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: background 0.15s;
    padding: 4px 2px;
    position: relative;
  }

  .day-btn:hover:not(:disabled) {
    background: #f5f5f5;
  }

  .day-btn .day-num {
    font-size: 15px;
    font-weight: 500;
    line-height: 1;
    color: #222;
  }

  .day-btn.sun .day-num { color: #c0392b; }
  .day-btn.sat .day-num { color: #2255cc; }
  .day-btn.holiday .day-num { color: #c0392b; }

  .day-btn .hol-name {
    font-size: 9px;
    color: #c0392b;
    line-height: 1;
    white-space: nowrap;
  }

  .day-btn:disabled {
    opacity: 0.25;
    cursor: default;
  }

  /* Selected state — filled circle */
  .day-btn.selected .day-num {
    color: white !important;
    background: #c0392b;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .day-btn.selected .hol-name { color: #c0392b; }

  /* Partial selected — outlined circle */
  .day-btn.partial .day-num {
    color: #c0392b !important;
    background: white;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #c0392b;
    box-sizing: border-box;
  }

  /* Time picker popup */
  .time-popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .time-popup-overlay.open {
    display: flex;
  }

  .time-popup {
    background: white;
    width: 100%;
    max-width: 480px;
    border-radius: 20px 20px 0 0;
    padding: 20px 24px 36px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .time-popup h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #1a1a2e;
  }

  .time-popup .popup-date {
    font-size: 13px;
    color: #888;
    margin-bottom: 18px;
  }

  .time-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .time-option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border: 1.5px solid #e8e8e8;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .time-option:hover {
    border-color: #c0392b;
    background: #fdecea;
  }

  .time-option.checked {
    border-color: #c0392b;
    background: #fdecea;
  }

  .time-option input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #c0392b;
    cursor: pointer;
    flex-shrink: 0;
  }

  .time-option .time-info {
    flex: 1;
  }

  .time-option .time-label {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a2e;
  }

  .time-option .time-range {
    font-size: 12px;
    color: #999;
    margin-top: 1px;
  }

  .time-option .time-icon {
    font-size: 22px;
  }

  .popup-actions {
    display: flex;
    gap: 10px;
  }

  .btn-cancel {
    flex: 1;
    padding: 13px;
    border: 1.5px solid #e0e0e0;
    background: white;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    color: #555;
    transition: background 0.15s;
  }

  .btn-cancel:hover { background: #f5f5f5; }

  .btn-confirm {
    flex: 2;
    padding: 13px;
    border: none;
    background: #c0392b;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    color: white;
    transition: background 0.15s;
  }

  .btn-confirm:hover { background: #a93226; }

  /* Summary */
  .summary-wrap {
    padding: 0 24px 20px;
  }

  .summary-title {
    font-size: 13px;
    font-weight: 500;
    color: #555;
    margin-bottom: 10px;
  }

  .summary-empty {
    font-size: 13px;
    color: #bbb;
    text-align: center;
    padding: 16px 0;
  }

  .summary-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .summary-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fdecea;
    border-radius: 8px;
    padding: 9px 12px;
  }

  .summary-item .s-date {
    font-size: 13px;
    font-weight: 600;
    color: #c0392b;
  }

  .summary-item .s-times {
    font-size: 12px;
    color: #555;
  }

  .summary-item .s-del {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: #bbb;
    padding: 0 0 0 8px;
    line-height: 1;
    transition: color 0.15s;
  }

  .summary-item .s-del:hover { color: #c0392b; }

  .memo-wrap {
    margin-bottom: 20px;
  }

  .memo-wrap label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #555;
    margin-bottom: 6px;
  }

  .memo-wrap textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #1a1a2e;
    resize: none;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
    min-height: 72px;
  }

  .memo-wrap textarea:focus {
    border-color: #c0392b;
  }

  .memo-wrap textarea::placeholder {
    color: #bbb;
  }
  .submit-wrap {
    padding: 4px 24px 28px;
  }

  .btn-submit {
    width: 100%;
    padding: 15px;
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-submit:hover { background: #2d2d50; }

  /* Result */
  .result-card {
    display: none;
    max-width: 480px;
    margin: 40px auto 0;
    background: white;
    border-radius: 16px;
    padding: 36px 24px;
    text-align: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }

  .result-card.show { display: block; }

  .result-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .result-card h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #1a1a2e;
  }

  .result-card p {
    font-size: 14px;
    color: #888;
    line-height: 1.6;
  }

  .result-detail {
    margin-top: 20px;
    background: #f9f9f9;
    border-radius: 10px;
    padding: 16px;
    text-align: left;
  }

  .result-detail .rd-item {
    font-size: 13px;
    color: #555;
    padding: 4px 0;
    border-bottom: 1px solid #eee;
  }

  .result-detail .rd-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<div class="card" id="formCard">
  <div class="card-header">
    <h1>CD WJL 6월 근무 스케줄 신청서</h1>
    <p>근무 가능한 날짜를 클릭하고 시간대를 선택해 주세요.<br>여러 날짜를 중복 선택할 수 있습니다.</p>
  </div>

  <div class="name-section">
    <label>이름</label>
    <input type="text" id="nameInput" placeholder="이름을 입력해 주세요">
  </div>

  <div class="section-title">근무 가능 날짜 및 시간대 선택</div>

  <div class="calendar-wrap">
    <div class="dow-row">
      <span class="sun">일</span>
      <span>월</span>
      <span>화</span>
      <span>수</span>
      <span>목</span>
      <span>금</span>
      <span class="sat">토</span>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="summary-wrap">
    <div class="summary-title">선택한 스케줄</div>
    <div id="summaryArea"><div class="summary-empty">선택한 날짜가 없습니다</div></div>
  </div>

  <div class="submit-wrap">
    <button class="btn-submit" onclick="submitForm()">제출하기</button>
  </div>
</div>

<!-- Time picker popup -->
<div class="time-popup-overlay" id="timePopup">
  <div class="time-popup">
    <h3>시간대 선택</h3>
    <div class="popup-date" id="popupDateLabel"></div>
    <div class="time-options">
      <label class="time-option" id="opt-am">
        <input type="checkbox" value="오전" onchange="syncOption(this)">
        <div class="time-info">
          <div class="time-label">오전</div>
          <div class="time-range">07:30 – 12:00</div>
        </div>
      </label>
      <label class="time-option" id="opt-pm">
        <input type="checkbox" value="오후" onchange="syncOption(this)">
        <div class="time-info">
          <div class="time-label">오후</div>
          <div class="time-range">12:30 – 17:00</div>
        </div>
      </label>
      <label class="time-option" id="opt-all">
        <input type="checkbox" value="종일" onchange="syncOption(this)">
        <div class="time-info">
          <div class="time-label">종일</div>
          <div class="time-range">07:30 – 17:00</div>
        </div>
      </label>
    </div>
    <div class="memo-wrap">
      <label>메모 (선택사항)</label>
      <textarea id="popupMemo" placeholder="이 날짜에 대한 메모를 입력해 주세요"></textarea>
    </div>
    <div class="popup-actions">
      <button class="btn-cancel" onclick="closePopup()">취소</button>
      <button class="btn-confirm" onclick="confirmSelection()">확인</button>
    </div>
  </div>
</div>

<div class="result-card" id="resultCard">
  <div class="result-icon">✅</div>
  <h2>제출 완료!</h2>
  <p>스케줄 문의가 접수되었습니다.<br>확인 후 연락드리겠습니다.</p>
  <div class="result-detail" id="resultDetail"></div>
</div>

<script>
  // 2026년 6월: 1일이 월요일(index 1)
  // 공휴일
  const holidays = {
    3: '지방선거',
    6: '현충일'
  };

  const selections = {}; // { day: { times: [...], memo: '' } }
  let currentDay = null;
  let tempChecked = [];

  const DOW = ['일','월','화','수','목','금','토'];

  function buildCalendar() {
    const grid = document.getElementById('calGrid');
    // Jun 1 = Monday = index 1
    const startOffset = 1;
    const totalDays = 30;

    // Empty cells before day 1
    for (let i = 0; i < startOffset; i++) {
      const empty = document.createElement('div');
      empty.className = 'cal-cell';
      grid.appendChild(empty);
    }

    for (let d = 1; d <= totalDays; d++) {
      const colIndex = (startOffset + d - 1) % 7;
      const isSun = colIndex === 0;
      const isSat = colIndex === 6;
      const isHoliday = !!holidays[d];
      const isDisabled = (d === 3 || d === 6); // 공휴일 비활성화 여부 → 활성 유지

      const cell = document.createElement('div');
      cell.className = 'cal-cell';

      const btn = document.createElement('button');
      btn.className = 'day-btn' + (isSun ? ' sun' : '') + (isSat ? ' sat' : '') + (isHoliday ? ' holiday' : '');
      btn.id = 'day-' + d;
      btn.onclick = () => openPopup(d);

      const numSpan = document.createElement('span');
      numSpan.className = 'day-num';
      numSpan.textContent = d;
      btn.appendChild(numSpan);

      if (isHoliday) {
        const holSpan = document.createElement('span');
        holSpan.className = 'hol-name';
        holSpan.textContent = holidays[d];
        btn.appendChild(holSpan);
      }

      cell.appendChild(btn);
      grid.appendChild(cell);
    }
  }

  function openPopup(day) {
    currentDay = day;
    const existing = selections[day] || {};
    tempChecked = [...(existing.times || [])];

    const colIndex = (1 + day - 1) % 7;
    document.getElementById('popupDateLabel').textContent =
      `6월 ${day}일 (${DOW[colIndex]})${holidays[day] ? ' · ' + holidays[day] : ''}`;

    ['opt-am','opt-pm','opt-all'].forEach(id => {
      const label = document.getElementById(id);
      const cb = label.querySelector('input');
      cb.checked = tempChecked.includes(cb.value);
      label.classList.toggle('checked', cb.checked);
    });

    document.getElementById('popupMemo').value = existing.memo || '';
    document.getElementById('timePopup').classList.add('open');
  }

  function syncOption(cb) {
    const label = cb.closest('.time-option');
    label.classList.toggle('checked', cb.checked);
    if (cb.checked) {
      if (!tempChecked.includes(cb.value)) tempChecked.push(cb.value);
    } else {
      tempChecked = tempChecked.filter(v => v !== cb.value);
    }
  }

  function closePopup() {
    document.getElementById('timePopup').classList.remove('open');
    currentDay = null;
    tempChecked = [];
  }

  function confirmSelection() {
    const memo = document.getElementById('popupMemo').value.trim();
    if (tempChecked.length === 0 && !memo) {
      delete selections[currentDay];
    } else {
      const order = ['오전','오후','종일'];
      selections[currentDay] = {
        times: order.filter(v => tempChecked.includes(v)),
        memo: memo
      };
    }
    updateDayBtn(currentDay);
    updateSummary();
    closePopup();
  }

  function updateDayBtn(day) {
    const btn = document.getElementById('day-' + day);
    if (!btn) return;
    const data = selections[day];
    btn.classList.remove('selected','partial');
    if (!data) return;
    const times = data.times || [];
    if (times.length === 0 && data.memo) {
      btn.classList.add('partial');
      return;
    }
    if (times.includes('종일') || times.length === 3) {
      btn.classList.add('selected');
    } else if (times.length > 0) {
      btn.classList.add('partial');
    }
  }

  function updateSummary() {
    const area = document.getElementById('summaryArea');
    const days = Object.keys(selections).map(Number).filter(d => {
      const data = selections[d];
      return data && (data.times.length > 0 || data.memo);
    }).sort((a,b) => a-b);

    if (days.length === 0) {
      area.innerHTML = '<div class="summary-empty">선택한 날짜가 없습니다</div>';
      return;
    }

    const list = document.createElement('div');
    list.className = 'summary-list';

    days.forEach(d => {
      const colIndex = (1 + d - 1) % 7;
      const data = selections[d];
      const item = document.createElement('div');
      item.className = 'summary-item';

      const left = document.createElement('div');
      left.style.flex = '1';

      const dateSpan = document.createElement('div');
      dateSpan.className = 's-date';
      dateSpan.textContent = `6/${d} (${DOW[colIndex]})`;

      const timesSpan = document.createElement('div');
      timesSpan.className = 's-times';
      timesSpan.textContent = data.times.length > 0 ? data.times.join(' · ') : '시간대 미선택';

      left.appendChild(dateSpan);
      left.appendChild(timesSpan);

      if (data.memo) {
        const memoSpan = document.createElement('div');
        memoSpan.style.cssText = 'font-size:11px;color:#999;margin-top:3px;';
        memoSpan.textContent = '📝 ' + data.memo;
        left.appendChild(memoSpan);
      }

      const delBtn = document.createElement('button');
      delBtn.className = 's-del';
      delBtn.textContent = '✕';
      delBtn.onclick = () => {
        delete selections[d];
        updateDayBtn(d);
        updateSummary();
      };

      item.appendChild(left);
      item.appendChild(delBtn);
      list.appendChild(item);
    });

    area.innerHTML = '';
    area.appendChild(list);
  }

  function submitForm() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) {
      alert('이름을 입력해 주세요.');
      document.getElementById('nameInput').focus();
      return;
    }

    const days = Object.keys(selections).map(Number).filter(d => {
      const data = selections[d];
      return data && (data.times.length > 0 || data.memo);
    }).sort((a,b) => a-b);
    if (days.length === 0) {
      alert('근무 가능한 날짜를 하나 이상 선택해 주세요.');
      return;
    }

    const schedules = days.map(d => {
      const colIndex = (1 + d - 1) % 7;
      const data = selections[d];
      return {
        date: `6/${d} (${DOW[colIndex]})`,
        times: data.times.join(', ') || '시간대 미선택',
        memo: data.memo || ''
      };
    });

    const btn = document.querySelector('.btn-submit');
    btn.textContent = '제출 중...';
    btn.disabled = true;

    fetch('https://script.google.com/macros/s/AKfycbx3PKQEgVGsSMK_kC10s1Y-D4s6yndtnwK8iy-DCibz6MTI2JhEzpQuGSuxXscDRgbE/exec', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, schedules })
    })
    .then(() => {
      document.getElementById('formCard').style.display = 'none';
      const result = document.getElementById('resultCard');
      result.classList.add('show');

      const detail = document.getElementById('resultDetail');
      let html = `<div class="rd-item" style="font-weight:600;color:#1a1a2e;margin-bottom:4px;">이름: ${name}</div>`;
      days.forEach(d => {
        const colIndex = (1 + d - 1) % 7;
        const data = selections[d];
        const timeStr = data.times.length > 0 ? data.times.join(', ') : '시간대 미선택';
        html += `<div class="rd-item">6/${d} (${DOW[colIndex]}) — ${timeStr}${data.memo ? '<br><span style="font-size:11px;color:#999;">메모: ' + data.memo + '</span>' : ''}</div>`;
      });
      detail.innerHTML = html;
    })
    .catch(() => {
      alert('제출 중 오류가 발생했습니다. 다시 시도해 주세요.');
      btn.textContent = '제출하기';
      btn.disabled = false;
    });
  }

  // Close popup on overlay click
  document.getElementById('timePopup').addEventListener('click', function(e) {
    if (e.target === this) closePopup();
  });

  buildCalendar();
</script>
</body>
</html>
